<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for Josellyn ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Quicksand', sans-serif; }
        
        body {
            background-image: url('https://wallpaperaccess.com/full/266210.jpg'); /* Background Pemandangan Estetik */
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* --- HALAMAN AWAL (AMPLOP) --- */
        #halamanAwal { text-align: center; }
        #envelopeIcon { font-size: 100px; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 0 10px rgba(0,0,0,0.3)); }
        #envelopeIcon:hover { transform: scale(1.1); }
        .btn-buka {
            margin-top: 20px;
            padding: 12px 35px;
            font-size: 1.1rem;
            border: none;
            border-radius: 30px;
            background: #ff69b4;
            color: white;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* --- HALAMAN PESAN --- */
        #halamanPesan {
            display: none;
            background: rgba(15, 23, 42, 0.9); /* Dark Transparan ala Screenshot */
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .gif-container img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #ff1493;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 { color: white; font-size: 1.3rem; margin-bottom: 15px; }
        p { color: #cbd5e1; line-height: 1.6; font-size: 0.95rem; margin-bottom: 25px; }

        .btn-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
            min-height: 50px;
            position: relative;
        }

        .btn-pilihan {
            padding: 10px 25px;
            font-size: 0.9rem;
            font-weight: bold;
            border-radius: 10px;
            border: 1px solid #475569;
            background: #1e293b;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        #noBtn { position: relative; z-index: 999; }
    </style>
</head>
<body>

    <div id="halamanAwal">
        <div id="envelopeIcon" onclick="bukaPesan()">✉️</div>
        <button class="btn-buka" onclick="bukaPesan()">Buka Pesan</button>
    </div>

    <div id="halamanPesan">
        <div class="gif-container">
            <img id="mainGif" src="https://i.ibb.co.com/5xWJSc1d/1000658021.gif" alt="Panda Cute">
        </div>

        <h1 id="title">Minal 'Aidin Wal Faizin ✨ — ♡.′</h1>
        <p id="message">
            Mohon maaf lahir dan batin dari aku untuk kamuuu Josellyn 🤗<br><br>
            Aku mau minta maaf atas semua kesalahan yang mungkin pernah aku lakukan kepadamu yaa 😁💫 Maafin aku kan?
        </p>

        <div class="btn-wrapper">
            <button id="yesBtn" class="btn-pilihan" onclick="dimaafin()">Mauu ❤️</button>
            <button id="noBtn" class="btn-pilihan" onmouseover="lariDong()" onclick="lariDong()">Gamauu 😜</button>
        </div>
    </div>

    <script>
        function bukaPesan() {
            document.getElementById('halamanAwal').style.display = 'none';
            document.getElementById('halamanPesan').style.display = 'block';
        }

        function lariDong() {
            const noBtn = document.getElementById('noBtn');
            noBtn.style.position = 'absolute';
            // Mencari posisi acak yang aman di layar HP
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
        }

        function dimaafin() {
            document.getElementById('title').innerHTML = "YEAYYY! ❤️";
            document.getElementById('message').innerHTML = "Makasih banyak udah dimaafin, <b>Josellyn</b>! Janji deh gak bakal bikin kesel lagi. Love you! 💖";
            document.getElementById('noBtn').style.display = 'none';
            document.getElementById('yesBtn').innerHTML = "Mwah! 😘";
            document.querySelector('.btn-wrapper').style.justifyContent = "center";
            alert("Terima kasih sudah memaafkan aku, Josellyn! ❤️");
        }
    </script>
</body>
</html>
